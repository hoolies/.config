# Terminal: tmux terminfo + true color for common outer terminals
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -sg escape-time 50

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind a setw synchronize-panes
bind ` set -g status

bind c command-prompt -p "Window Name:" "new-window; rename-window '%%'"
bind C new-window

bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# vim-tmux-navigator (TPM): Ctrl+Shift + hjkl / p (must match Neovim, Vim, Helix maps)
set -g @vim_navigator_mapping_left 'C-S-h'
set -g @vim_navigator_mapping_down 'C-S-j'
set -g @vim_navigator_mapping_up 'C-S-k'
set -g @vim_navigator_mapping_right 'C-S-l'
set -g @vim_navigator_mapping_prev 'C-S-p'

# Settings for tmux-notify
set -g @tnotify-verbose 'on'
set -g @tnotify-verbose-title 'tmux'
set -g @tnotify-verbose-msg 'Done: #S / #I:#P — #W'


# Logging settings
set -g @logging_key 'C-o'

set -g @logging-path '~/.tmux/logs'
set -g @logging-filename 'tmux-#{session_name}-#{window_index}-#{pane_index}-%Y-%m-%d.log'
set -g @screen-capture-path '~/.tmux/logs'
set -g @save-complete-history-path '~/.tmux/logs'

# TPM: plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'niqodea/tmux-matryoshka'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# TPM bootstrap
if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

# tmux-resurrect: Auto save
set-hook -g after-new-window "run-shell '#{@resurrect-save-script-path} quiet'"
set-hook -g after-split-window "run-shell '#{@resurrect-save-script-path} quiet'"
set-hook -g pane-exited "run-shell '#{@resurrect-save-script-path} quiet'"
